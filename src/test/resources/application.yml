app:
  rag:
    local-vector-store:
      enabled: false
spring:
  ai:
    dashscope:
      api-key: sk
      chat:
        api-key: sk

    model:
      chat: dashscope
      embedding: dashscope
      audio:
        speech: none
        transcription: none
      image: none
      video: none
      rerank: none

  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration
